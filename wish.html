<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    <title>wish</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

    <body class = "wish-page">
        <div>
<h1 class="happy" align="center">
 Happy Birthday, Salmon!
</h1>
        </div>
       
<hr width="50%" color="blue">
<br>
<br>

<div>
<p align="center"> Click the candle to make a wish! </p>

        <img src="Cake.svg" class="cake" onclick="makeWish()" alt="Cake" style="display: block; margin: 0 auto; width: 90%; height: auto; cursor: pointer;">

 </div>
 <br>

<br> <br> <br>
<audio id="hbdSong">
  <source src="hbd.mp3" type="audio/mpeg">
</audio>
<br>
<div id="wishPopup" class="popup">

    <div class="popup-content">
        <img src="lucky.jpg" class="popup-img">

        <p class="poem">
           May all your wishes come true!
        </p>

        <button onclick="closeWish()">Close ✨</button>
    </div>

</div>

<div id="confetti-container"></div>

<script>

    function launchConfetti(){

    const container = document.getElementById("confetti-container");

    for(let i=0;i<60;i++){

        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background =
            `hsl(${Math.random()*360},80%,60%)`;

        confetti.style.animationDuration =
            (2 + Math.random()*2) + "s";

        container.appendChild(confetti);

        setTimeout(()=>confetti.remove(),3000);
    }
}

function makeWish() {

     // play music
    document.getElementById("hbdSong").play();

    launchConfetti();

    // show popup
    document.getElementById("wishPopup")
        .classList.add("show");
}

function closeWish(){
    document.getElementById("wishPopup")
        .classList.remove("show");

}

</script>


 <div id="back-menu">
    <a href="index.html" class="back-btn">
        ← Kembali
    </a>
</div>
</body>
</html>
